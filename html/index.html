<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop</title>
    <link rel="icon" href="/1/Proyectos/Shop/img/shopping-cart.ico">
    <link rel="stylesheet" href="/1/Proyectos/Shop/css/style.css" />
  </head>
  <body>
    <header>
      <h1>Shop</h1>
      <nav>
        <ul>
          <li><button id="products_BTN">Productos</button></li>
          <li><button id="cart_BTN">Carrito</button></li>
          <li><button id="admin_BTN">Admin</button></li>
        </ul>
      </nav>
    </header>
    <section id="products">
      <h2>Productos</h2>
      <input type="search" name="Buscar" id="Buscar" />
      <div id="Products_all"></div>
    </section>
    <section id="cart">
      <h2>Carrito de Compras</h2>
      <p>Total:<span id="total">0</span>$</p>
      <ul id="Cart-Items"></ul>
    </section>
    <section id="admin">
      <h2>Panel de Administrador</h2>

      <form id="Login">
        <label for="Username">Usuario:</label>
        <input type="text" name="username" id="username" />
        <label for="password">Contraseña:</label>
        <input type="password" name="password" id="password" />
        <span id="Error" style="display: none"
          >Usuario o Contraseña incorrecto</span
        >
        <button type="submit">Iniciar Admin</button>
      </form>
      <div id="Ad_Pan" style="display: none">
        <div class="Admin-Panel">
          <label for="ProductName">Nombre del Producto</label>
          <input type="text" name="NombreProducto" id="ProductName" />
          <label for="PricePro">Precio Del Producto</label>
          <input type="number" name="Precio" id="Price" />
          <label for="Img">Imagen del Producto</label>
          <input
            type="file"
            id="Imagen"
            name="Imagen"
            accept="image/png, image/jpeg"
          />
          <button id="Agregar">Agregar Producto</button>
        </div>
        <div class="Admin-Panel">
          <select name="listProduct" id="listProduct">
          </select>
          <section id="VistaPrevia">
            <h3 id="NombreProAd">Titulo</h3>
            <img id="ImgProAd" src="" alt="producto" />
            <p id="PriceProAd"></p>
          </section>
          <button id="BorrarProducto">Quitar Producto</button>
        </div>
        <button id="cerrarSesion">Cerrar Sesión</button>
      </div>
    </section>
    <script src="/1/Proyectos/Shop/js/logic.js"></script>
  </body>
</html>
